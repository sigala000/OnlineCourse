<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Browse our collection of online courses in marketing, management, design, development, and HR.">
  <title>Online Courses | Course Catalog</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <main>
    <section class="courses" aria-labelledby="courses-heading">
      <!-- Decorative left element -->
      <div class="courses__decor-left" aria-hidden="true">
        <svg viewBox="0 0 60 60" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
          <path d="M10 10 L50 10 L50 15 L15 15 L15 50 L10 50 Z" />
          <path d="M20 20 L50 20 L50 25 L25 25 L25 50 L20 50 Z" />
        </svg>
      </div>

      <!-- Decorative right element -->
      <div class="courses__decor-right" aria-hidden="true">
        <svg viewBox="0 0 60 60" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
          <path d="M50 10 L10 10 L10 15 L45 15 L45 50 L50 50 Z" />
          <path d="M40 20 L10 20 L10 25 L35 25 L35 50 L40 50 Z" />
        </svg>
      </div>

      <div class="courses__container">
        <header class="courses__header">
          <span class="courses__subtitle">Enjoy your studying!</span>
          <h1 id="courses-heading" class="courses__title">Our online courses</h1>
        </header>

        <div class="courses__controls">
          <nav class="filters" aria-label="Course category filters" data-filters></nav>

          <div class="search" role="search">
            <label for="course-search" class="sr-only">Search courses</label>
            <input
              id="course-search"
              type="search"
              class="search__input"
              placeholder="Search course..."
              aria-label="Search courses by title"
              data-search-input
            />
            <svg class="search__icon" aria-hidden="true" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M7.33333 12.6667C10.2789 12.6667 12.6667 10.2789 12.6667 7.33333C12.6667 4.38781 10.2789 2 7.33333 2C4.38781 2 2 4.38781 2 7.33333C2 10.2789 4.38781 12.6667 7.33333 12.6667Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M14 14L11.1333 11.1333" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        </div>

        <div class="courses__grid" data-courses-grid></div>

        <div class="courses__load-more">
          <button
            type="button"
            class="button button--load-more"
            data-load-more
            aria-label="Load more courses"
          >
            <svg class="button__icon" aria-hidden="true" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M2.66667 4.66667H10C11.8409 4.66667 13.3333 6.15905 13.3333 8C13.3333 9.84095 11.8409 11.3333 10 11.3333H8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M5.33333 2L2.66667 4.66667L5.33333 7.33333" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M13.3333 11.3333H6C4.15905 11.3333 2.66667 9.84095 2.66667 8C2.66667 6.15905 4.15905 4.66667 6 4.66667H8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M10.6667 13.3333L13.3333 10.6667L10.6667 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Load more
          </button>
        </div>

        <div class="empty-state" data-empty-state hidden>
          <svg class="empty-state__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <h2 class="empty-state__title">No courses found</h2>
          <p class="empty-state__text">Try adjusting your search or filters to find what you're looking for.</p>
        </div>
      </div>
    </section>
  </main>

  <script type="module" src="js/main.js"></script>
</body>
</html>
